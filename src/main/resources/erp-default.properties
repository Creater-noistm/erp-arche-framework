# ═══════════════════════════════════════════
# 始祖ERP框架 — 默认配置文件
# 复制为 erp-config.properties 并修改
# ═══════════════════════════════════════════

# ── 线程池 ──
kernel.threads.core=4
kernel.threads.max=32

# ── 模块系统 ──
kernel.module.scanPath=modules/
kernel.module.hotDeploy=true
kernel.module.startTimeoutMs=30000

# ── 多租户 ──
kernel.tenant.defaultId=default
kernel.tenant.isolation=ROW

# ── 安全 ──
kernel.security.audit=true

# ── 数据模型 ──
kernel.model.maxCustomFields=200
kernel.model.dynamicValidation=true

# ── 事件 ──
kernel.event.queueCapacity=4096
kernel.event.asyncDispatch=true

# ── UI ──
kernel.ui.theme=Nimbus
kernel.ui.showModuleConsole=true

# ── 自定义扩展配置（各模块自行读取） ──
erp.finance.defaultCurrency=CNY
erp.inventory.defaultWarehouse=主仓库
erp.hr.workingDaysPerMonth=21.75
